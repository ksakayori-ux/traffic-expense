<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交通費精算クラウド</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- Firebase SDK (Compat Version for ease of use) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background-color: #f8fafc;
    }
    .custom-shadow {
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col">

  <!-- ヘッダー -->
  <header class="bg-white border-b border-slate-100 sticky top-0 z-40 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <div class="bg-blue-600 text-white p-2 rounded-xl shadow-md shadow-blue-200">
          <i class="fa-solid fa-file-invoice-dollar text-xl"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold text-slate-900 tracking-tight">交通費精算クラウド</h1>
          <p class="text-xs text-slate-500 font-medium">いつでも・どこでも簡単入力</p>
        </div>
      </div>
      <!-- Excel保存ボタン -->
      <button onclick="downloadCSV()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-medium text-sm px-4 py-2.5 rounded-xl transition-all shadow-md shadow-emerald-100 flex items-center space-x-2">
        <i class="fa-solid fa-file-excel"></i>
        <span>Excel形式で保存</span>
      </button>
    </div>
  </header>

  <!-- タブ切替 -->
  <div class="bg-white border-b border-slate-100 sticky top-[73px] z-30">
    <div class="max-w-6xl mx-auto px-4 flex">
      <button id="tab-register-btn" onclick="switchTab('register')" class="flex-1 py-4 text-center font-bold text-sm border-b-2 border-blue-600 text-blue-600 transition-all flex items-center justify-center space-x-2">
        <i class="fa-solid fa-pen-to-square"></i>
        <span>交通費登録</span>
      </button>
      <button id="tab-report-btn" onclick="switchTab('report')" class="flex-1 py-4 text-center font-bold text-sm border-b-2 border-transparent text-slate-500 hover:text-slate-800 transition-all flex items-center justify-center space-x-2">
        <i class="fa-solid fa-chart-pie"></i>
        <span>月別・人別集計表</span>
      </button>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <main class="flex-1 max-w-6xl w-full mx-auto p-4 md:py-8">

    <!-- タブ①：登録フォーム & 履歴一覧 -->
    <div id="tab-register" class="space-y-6">
      
      <!-- 入力フォームカード -->
      <div class="bg-white rounded-2xl border border-slate-100 custom-shadow p-6">
        <h2 class="text-base font-bold text-slate-900 mb-6 flex items-center space-x-2">
          <span class="w-1.5 h-5 bg-blue-600 rounded-full inline-block"></span>
          <span>交通費の新規登録</span>
        </h2>

        <form id="expense-form" onsubmit="handleFormSubmit(event)" class="space-y-6">
          
          <!-- 日付・氏名 -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- 日付 -->
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">
                <i class="fa-regular fa-calendar-days mr-1 text-blue-500"></i>日付
              </label>
              <input type="date" id="input-date" required
                class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-base bg-white shadow-sm">
            </div>

            <!-- 氏名 -->
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">
                <i class="fa-regular fa-user mr-1 text-blue-500"></i>氏名
              </label>
              <div class="relative">
                <select id="input-name" required
                  class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none bg-white shadow-sm text-base">
                  <option value="" disabled selected hidden>選択してください</option>
                  <option value="坂寄">坂寄</option>
                  <option value="小川">小川</option>
                  <option value="深澤">深澤</option>
                  <option value="森尻">森尻</option>
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-400">
                  <i class="fa-solid fa-chevron-down"></i>
                </div>
              </div>
            </div>
          </div>

          <!-- 交通手段の選択（リニューアル） -->
          <div>
            <label class="block text-sm font-medium text-slate-600 mb-2">
              <i class="fa-solid fa-route mr-1 text-blue-500"></i>交通手段
            </label>
            <div class="grid grid-cols-4 gap-2">
              <button type="button" id="btn-train" onclick="selectTransport('train')" class="py-3 px-2 rounded-xl text-center border-2 border-blue-600 text-blue-600 font-bold bg-blue-50/50 flex flex-col items-center justify-center transition-all">
                <i class="fa-solid fa-train text-lg mb-1"></i>
                <span class="text-xs">電車</span>
              </button>
              <button type="button" id="btn-taxi" onclick="selectTransport('taxi')" class="py-3 px-2 rounded-xl text-center border border-slate-200 text-slate-600 font-medium hover:bg-slate-50 flex flex-col items-center justify-center transition-all">
                <i class="fa-solid fa-taxi text-lg mb-1"></i>
                <span class="text-xs">タクシー</span>
              </button>
              <button type="button" id="btn-bus" onclick="selectTransport('bus')" class="py-3 px-2 rounded-xl text-center border border-slate-200 text-slate-600 font-medium hover:bg-slate-50 flex flex-col items-center justify-center transition-all">
                <i class="fa-solid fa-bus text-lg mb-1"></i>
                <span class="text-xs">バス</span>
              </button>
              <button type="button" id="btn-other" onclick="selectTransport('other')" class="py-3 px-2 rounded-xl text-center border border-slate-200 text-slate-600 font-medium hover:bg-slate-50 flex flex-col items-center justify-center transition-all">
                <i class="fa-solid fa-ellipsis text-lg mb-1"></i>
                <span class="text-xs">その他</span>
              </button>
            </div>
            <input type="hidden" id="input-transport" value="train">
          </div>

          <!-- 出発地・目的地（タクシー選択時は自動で非表示になります） -->
          <div id="section-route" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label id="lbl-from" class="block text-sm font-medium text-slate-600 mb-1">出発地（乗車駅）</label>
              <input type="text" id="input-from" placeholder="例：渋谷" required
                class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-base bg-white shadow-sm">
            </div>
            <div>
              <label id="lbl-to" class="block text-sm font-medium text-slate-600 mb-1">目的地（降車駅）</label>
              <input type="text" id="input-to" placeholder="例：新宿" required
                class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-base bg-white shadow-sm">
            </div>
          </div>

          <!-- Yahoo路線検索連携ボタン（電車・バスのみ表示） -->
          <div id="section-yahoo-btn" class="hidden">
            <button type="button" onclick="lookupYahooRoute()"
              class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 px-4 rounded-xl transition-all flex items-center justify-center space-x-2 text-sm border border-slate-200">
              <i class="fa-solid fa-magnifying-glass text-red-500"></i>
              <span id="lbl-yahoo-text">Yahoo!路線情報で運賃を調べる</span>
            </button>
          </div>

          <!-- 金額入力（交通手段に応じて自動で最適化されます） -->
          <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
            <!-- ① 電車用：ICと切符の選択式 -->
            <div id="section-fare-train" class="space-y-4">
              <span class="block text-sm font-bold text-slate-700 mb-1">運賃の入力</span>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white p-3 rounded-xl border border-slate-200">
                  <label class="block text-xs font-bold text-slate-500 mb-1">ICカード利用（推奨）</label>
                  <div class="relative">
                    <input type="number" id="input-ic-fare" placeholder="0" min="0"
                      class="w-full border-b border-slate-200 focus:border-blue-500 py-1 pr-6 focus:outline-none text-lg font-bold text-slate-800">
                    <span class="absolute right-0 bottom-1.5 text-sm text-slate-400 font-bold">円</span>
                  </div>
                </div>
                <div class="bg-white p-3 rounded-xl border border-slate-200">
                  <label class="block text-xs font-bold text-slate-500 mb-1">切符・その他通常運賃</label>
                  <div class="relative">
                    <input type="number" id="input-regular-fare" placeholder="0" min="0"
                      class="w-full border-b border-slate-200 focus:border-blue-500 py-1 pr-6 focus:outline-none text-lg font-bold text-slate-800">
                    <span class="absolute right-0 bottom-1.5 text-sm text-slate-400 font-bold">円</span>
                  </div>
                </div>
              </div>
            </div>

            <!-- ② タクシー/バス/その他用：1本化された入力 -->
            <div id="section-fare-single" class="hidden">
              <label class="block text-sm font-bold text-slate-700 mb-2">運賃（消費税込）</label>
              <div class="bg-white p-3 rounded-xl border border-slate-200 relative">
                <input type="number" id="input-single-fare" placeholder="0" min="0"
                  class="w-full border-none focus:outline-none text-xl font-bold text-slate-800 pr-10">
                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-base text-slate-400 font-bold">円</span>
              </div>
            </div>
          </div>

          <!-- 備考 -->
          <div>
            <label class="block text-sm font-medium text-slate-600 mb-1">
              <i class="fa-regular fa-comment-dots mr-1 text-blue-500"></i>備考（用件、訪問先など）
            </label>
            <input type="text" id="input-memo" placeholder="例：〇〇株式会社様 訪問打ち合わせのため"
              class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-base bg-white shadow-sm">
          </div>

          <!-- 登録ボタン -->
          <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg shadow-blue-100 flex items-center justify-center space-x-2 text-base">
            <i class="fa-solid fa-paper-plane"></i>
            <span>登録する</span>
          </button>
        </form>
      </div>

      <!-- 精算履歴一覧 -->
      <div class="bg-white rounded-2xl border border-slate-100 custom-shadow p-6">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-base font-bold text-slate-900 flex items-center space-x-2">
            <span class="w-1.5 h-5 bg-blue-600 rounded-full inline-block"></span>
            <span>精算履歴（新着順）</span>
          </h2>
          <span id="history-count" class="text-xs bg-slate-100 text-slate-600 font-bold px-2.5 py-1 rounded-full">0件</span>
        </div>

        <div id="history-list" class="space-y-4 max-h-[500px] overflow-y-auto pr-1">
          <!-- JSで履歴カードが動的に挿入されます -->
          <div class="text-center py-8 text-slate-400 text-sm">
            <i class="fa-solid fa-spinner fa-spin mr-2"></i>履歴データを読み込み中...
          </div>
        </div>
      </div>

    </div>

    <!-- タブ②：月別・人別集計表 -->
    <div id="tab-report" class="hidden space-y-6">
      
      <!-- 月度フィルター -->
      <div class="bg-white rounded-2xl border border-slate-100 custom-shadow p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
          <h2 class="text-base font-bold text-slate-900">月別集計表</h2>
          <p class="text-xs text-slate-500 mt-1">「毎月25日〜翌月24日」締めルールで集計されています</p>
        </div>
        <div class="flex items-center space-x-2 w-full md:w-auto">
          <label class="text-sm font-medium text-slate-600 shrink-0">表示月度:</label>
          <input type="month" id="filter-month" onchange="loadReport()"
            class="border border-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-base bg-white shadow-sm font-bold text-slate-700 w-full md:w-auto">
        </div>
      </div>

      <!-- 人別集計グラフ & 表 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- ビジュアルグラフ表示 -->
        <div class="bg-white rounded-2xl border border-slate-100 custom-shadow p-6">
          <h3 class="text-sm font-bold text-slate-900 mb-6">個人別の交通費（グラフ）</h3>
          <div id="report-graph-container" class="space-y-6">
            <!-- JSで動的にプログレスバーを生成 -->
            <div class="text-center py-8 text-slate-400 text-sm">
              データがありません
            </div>
          </div>
        </div>

        <!-- テーブル表表示 -->
        <div class="bg-white rounded-2xl border border-slate-100 custom-shadow p-6">
          <h3 class="text-sm font-bold text-slate-900 mb-4">個人別の内訳（一覧）</h3>
          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm text-slate-600">
              <thead>
                <tr class="border-b border-slate-100 text-slate-400 text-xs">
                  <th class="py-3 font-medium">氏名</th>
                  <th class="py-3 font-medium text-right">件数</th>
                  <th class="py-3 font-medium text-right">合計金額</th>
                </tr>
              </thead>
              <tbody id="report-table-body">
                <!-- JSで集計結果の行を挿入 -->
              </tbody>
            </table>
          </div>
        </div>

      </div>

    </div>

  </main>

  <!-- 登録完了ダイアログ -->
  <div id="custom-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 text-center custom-shadow animate-[bounce_0.5s_ease-out]">
      <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl shadow-inner">
        <i class="fa-solid fa-circle-check animate-pulse"></i>
      </div>
      <h3 class="text-lg font-bold text-slate-900 mb-2">精算データを登録しました</h3>
      <p class="text-sm text-slate-500 mb-6">クラウドへの保存と専用Chatへの通知が完了しました！</p>
      <button onclick="closeCustomModal()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-4 rounded-xl transition-all">
        閉じる
      </button>
    </div>
  </div>

  <!-- ----------------- JavaScript 処理部 ----------------- -->
  <script>
    // Firebase設定 (ユーザー様のデータベースに接続されます)
    const firebaseConfig = {
      apiKey: "AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI",
      authDomain: "ksakayori-ux.firebaseapp.com",
      projectId: "ksakayori-ux",
      storageBucket: "ksakayori-ux.appspot.com",
      messagingSenderId: "1055535314059",
      appId: "1:1055535314059:web:1584c37e6f85ebecb476eb"
    };

    // Firebaseの初期化
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 締め日前日のリマインドなどで使われる、ユーザー様の専用Google Chat Webhook
    const webhookUrl = "https://chat.googleapis.com/v1/spaces/AAAAxHdOaBA/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=Fsh3lqmrbuDx8AqJIyHfeBdDecgx03H1pEJgwBUuPMw";

    // 交通手段のデータ一覧を管理
    let currentTransport = 'train';
    let allRecords = [];

    // 画面タブ切替
    window.switchTab = function(tabName) {
      const regTab = document.getElementById('tab-register');
      const repTab = document.getElementById('tab-report');
      const regBtn = document.getElementById('tab-register-btn');
      const repBtn = document.getElementById('tab-report-btn');

      if (tabName === 'register') {
        regTab.classList.remove('hidden');
        repTab.classList.add('hidden');
        regBtn.className = "flex-1 py-4 text-center font-bold text-sm border-b-2 border-blue-600 text-blue-600 transition-all flex items-center justify-center space-x-2";
        repBtn.className = "flex-1 py-4 text-center font-bold text-sm border-b-2 border-transparent text-slate-500 hover:text-slate-800 transition-all flex items-center justify-center space-x-2";
      } else {
        regTab.classList.add('hidden');
        repTab.classList.remove('hidden');
        regBtn.className = "flex-1 py-4 text-center font-bold text-sm border-b-2 border-transparent text-slate-500 hover:text-slate-800 transition-all flex items-center justify-center space-x-2";
        repBtn.className = "flex-1 py-4 text-center font-bold text-sm border-b-2 border-blue-600 text-blue-600 transition-all flex items-center justify-center space-x-2";
        loadReport();
      }
    };

    // 交通手段選択切り替え
    window.selectTransport = function(type) {
      currentTransport = type;
      document.getElementById('input-transport').value = type;

      const btnTrain = document.getElementById('btn-train');
      const btnTaxi = document.getElementById('btn-taxi');
      const btnBus = document.getElementById('btn-bus');
      const btnOther = document.getElementById('btn-other');

      // ボタンの見た目初期化
      [btnTrain, btnTaxi, btnBus, btnOther].forEach(btn => {
        btn.className = "py-3 px-2 rounded-xl text-center border border-slate-200 text-slate-600 font-medium hover:bg-slate-50 flex flex-col items-center justify-center transition-all";
      });

      // 選択されたボタンをアクティブ化
      const activeBtn = document.getElementById(`btn-${type}`);
      activeBtn.className = "py-3 px-2 rounded-xl text-center border-2 border-blue-600 text-blue-600 font-bold bg-blue-50/50 flex flex-col items-center justify-center transition-all";

      // 各種表示の動的変更
      const routeSection = document.getElementById('section-route');
      const yahooSection = document.getElementById('section-yahoo-btn');
      const fareTrain = document.getElementById('section-fare-train');
      const fareSingle = document.getElementById('section-fare-single');

      const fromInput = document.getElementById('input-from');
      const toInput = document.getElementById('input-to');

      if (type === 'train') {
        // 電車
        routeSection.classList.remove('hidden');
        yahooSection.classList.remove('hidden');
        fareTrain.classList.remove('hidden');
        fareSingle.classList.add('hidden');
        document.getElementById('lbl-from').innerText = "出発地（乗車駅）";
        document.getElementById('lbl-to').innerText = "目的地（降車駅）";
        fromInput.required = true;
        toInput.required = true;
        document.getElementById('lbl-yahoo-text').innerText = "Yahoo!路線情報で電車運賃を調べる";
      } else if (type === 'bus') {
        // バス
        routeSection.classList.remove('hidden');
        yahooSection.classList.remove('hidden');
        fareTrain.classList.add('hidden');
        fareSingle.classList.remove('hidden');
        document.getElementById('lbl-from').innerText = "出発地";
        document.getElementById('lbl-to').innerText = "目的地";
        fromInput.required = true;
        toInput.required = true;
        document.getElementById('lbl-yahoo-text').innerText = "Yahoo!路線情報でバス運賃を調べる";
      } else if (type === 'taxi') {
        // タクシー
        routeSection.classList.add('hidden');
        yahooSection.classList.add('hidden');
        fareTrain.classList.add('hidden');
        fareSingle.classList.remove('hidden');
        fromInput.required = false;
        toInput.required = false;
        fromInput.value = "";
        toInput.value = "";
      } else {
        // その他
        routeSection.classList.remove('hidden');
        yahooSection.classList.add('hidden');
        fareTrain.classList.add('hidden');
        fareSingle.classList.remove('hidden');
        document.getElementById('lbl-from').innerText = "出発地";
        document.getElementById('lbl-to').innerText = "目的地";
        fromInput.required = true;
        toInput.required = true;
      }

      updateYahooButton();
    };

    // Yahoo路線検索起動
    window.lookupYahooRoute = function() {
      const from = document.getElementById('input-from').value.trim();
      const to = document.getElementById('input-to').value.trim();
      if (!from || !to) return;

      let url = "";
      if (currentTransport === 'bus') {
        // バス優先モード
        url = `https://transit.yahoo.co.jp/search/result?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&kb=1&type=5`;
      } else {
        // 電車通常
        url = `https://transit.yahoo.co.jp/search/result?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
      }
      window.open(url, '_blank');
    };

    // Yahoo検索ボタンの活性化制御
    function updateYahooButton() {
      const from = document.getElementById('input-from').value.trim();
      const to = document.getElementById('input-to').value.trim();
      const yahooBtn = document.getElementById('section-yahoo-btn');

      if ((currentTransport === 'train' || currentTransport === 'bus') && from && to) {
        yahooBtn.classList.remove('hidden');
      } else {
        yahooBtn.classList.add('hidden');
      }
    }

    // 入力欄変更時の監視
    document.getElementById('input-from').addEventListener('input', updateYahooButton);
    document.getElementById('input-to').addEventListener('input', updateYahooButton);

    // 交通費の登録実行
    window.handleFormSubmit = async function(e) {
      e.preventDefault();

      const date = document.getElementById('input-date').value;
      const name = document.getElementById('input-name').value;
      const transport = document.getElementById('input-transport').value;
      const from = document.getElementById('input-from').value.trim();
      const to = document.getElementById('input-to').value.trim();
      const memo = document.getElementById('input-memo').value.trim();

      if (!name) {
        alert("氏名を選択してください。");
        return;
      }

      let fare = 0;
      let payment = "普通運賃";

      if (transport === 'train') {
        const icFare = parseInt(document.getElementById('input-ic-fare').value) || 0;
        const regularFare = parseInt(document.getElementById('input-regular-fare').value) || 0;
        if (icFare > 0) {
          fare = icFare;
          payment = "ICカード";
        } else if (regularFare > 0) {
          fare = regularFare;
          payment = "切符・現金";
        } else {
          alert("運賃（ICカードまたは切符運賃のいずれか）を入力してください。");
          return;
        }
      } else {
        fare = parseInt(document.getElementById('input-single-fare').value) || 0;
        if (fare <= 0) {
          alert("運賃（金額）を入力してください。");
          return;
        }
        payment = transport === 'taxi' ? 'タクシー' : (transport === 'bus' ? '路線バス' : 'その他');
      }

      // Firestoreへのデータ送信
      const record = {
        date,
        name,
        transport,
        from: transport === 'taxi' ? '（場所指定なし）' : from,
        to: transport === 'taxi' ? '（場所指定なし）' : to,
        fare,
        payment,
        memo,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        await db.collection("records").add(record);

        // Google Chatへの即時通知送信
        let emoji = '🚃';
        if (transport === 'taxi') emoji = '🚖';
        if (transport === 'bus') emoji = '🚌';
        if (transport === 'other') emoji = '💼';

        const locationText = transport === 'taxi' ? '（タクシー利用・乗降場所略）' : `${from} ➡️ ${to}`;

        const chatMessage = `📢 【交通費精算】精算登録が完了しました！\n\n` +
                            `👤 精算者: ${name} さん\n` +
                            `${emoji} 交通手段: ${payment}\n` +
                            `📍 移動区間: ${locationText}\n` +
                            `💵 精算金額: ¥${fare.toLocaleString()}\n` +
                            `📝 備考: ${memo || 'なし'}\n\n` +
                            `📱 交通費精算アプリURL:\nhttps://ksakayori-ux.github.io/traffic-expense/`;

        fetch(webhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: chatMessage })
        }).catch(err => console.warn("Chat送信スキップ:", err));

        // フォームをまっさらに戻す（日付と氏名も含めてリセット）
        document.getElementById('input-date').value = "";
        document.getElementById('input-name').value = "";
        document.getElementById('input-from').value = "";
        document.getElementById('input-to').value = "";
        document.getElementById('input-ic-fare').value = "";
        document.getElementById('input-regular-fare').value = "";
        document.getElementById('input-single-fare').value = "";
        document.getElementById('input-memo').value = "";
        
        // 交通手段を電車（初期）に戻す
        selectTransport('train');

        // 完了ポップアップの表示
        showCustomModal();
        
        // リスト再読み込み
        loadRecords();

      } catch (error) {
        console.error("データの登録中にエラーが発生しました:", error);
        alert("登録できませんでした。もう一度お試しください。");
      }
    };

    // レコード削除
    window.deleteRecord = async function(id) {
      if (!confirm("この交通費データを削除してよろしいですか？")) return;
      try {
        await db.collection("records").doc(id).delete();
        loadRecords();
      } catch (error) {
        console.error("削除エラー:", error);
        alert("削除に失敗しました。");
      }
    };

    // モーダルの開閉
    function showCustomModal() {
      document.getElementById('custom-modal').classList.remove('hidden');
    }
    window.closeCustomModal = function() {
      document.getElementById('custom-modal').classList.add('hidden');
    };

    // 履歴データのリアルタイム読み込み
    function loadRecords() {
      db.collection("records").orderBy("date", "desc").orderBy("createdAt", "desc").limit(50)
        .onSnapshot((querySnapshot) => {
          allRecords = [];
          const listContainer = document.getElementById('history-list');
          listContainer.innerHTML = "";

          document.getElementById('history-count').innerText = `${querySnapshot.size}件`;

          if (querySnapshot.empty) {
            listContainer.innerHTML = `<div class="text-center py-8 text-slate-400 text-sm">登録済みのデータはまだありません。</div>`;
            return;
          }

          querySnapshot.forEach((doc) => {
            const data = doc.data();
            data.id = doc.id;
            allRecords.push(data);

            let iconHtml = '<i class="fa-solid fa-train text-blue-500 bg-blue-50 p-2.5 rounded-xl text-base"></i>';
            if (data.transport === 'taxi') {
              iconHtml = '<i class="fa-solid fa-taxi text-amber-500 bg-amber-50 p-2.5 rounded-xl text-base"></i>';
            } else if (data.transport === 'bus') {
              iconHtml = '<i class="fa-solid fa-bus text-emerald-500 bg-emerald-50 p-2.5 rounded-xl text-base"></i>';
            } else if (data.transport === 'other') {
              iconHtml = '<i class="fa-solid fa-ellipsis text-slate-500 bg-slate-50 p-2.5 rounded-xl text-base"></i>';
            }

            const fromToText = data.transport === 'taxi' ? 'タクシー乗車' : `${data.from} ➡️ ${data.to}`;

            const card = document.createElement('div');
            card.className = "bg-slate-50 rounded-xl p-4 border border-slate-100 flex justify-between items-center relative hover:bg-slate-100/50 transition-all";
            card.innerHTML = `
              <div class="flex items-center space-x-3 pr-8">
                ${iconHtml}
                <div>
                  <div class="flex items-center space-x-2">
                    <span class="text-sm font-bold text-slate-800">${data.name}</span>
                    <span class="text-[10px] text-slate-400 font-medium">${data.date}</span>
                  </div>
                  <p class="text-xs text-slate-600 font-medium mt-0.5">${fromToText}</p>
                  ${data.memo ? `<p class="text-[11px] text-slate-400 mt-1"><i class="fa-regular fa-comment mr-1"></i>${data.memo}</p>` : ''}
                </div>
              </div>
              <div class="text-right flex flex-col items-end shrink-0">
                <span class="text-sm font-bold text-slate-900">¥${data.fare.toLocaleString()}</span>
                <span class="text-[10px] text-slate-400 mt-0.5">${data.payment}</span>
                <button onclick="deleteRecord('${data.id}')" class="absolute top-2 right-2 text-slate-300 hover:text-rose-500 p-1 transition-all text-xs" title="削除">
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </div>
            `;
            listContainer.appendChild(card);
          });
          
          // タブ②のレポートをバックグラウンド更新
          loadReport();
        }, (error) => {
          console.error("データ取得中にエラーが発生しました:", error);
        });
    }

    // レポート集計
    window.loadReport = function() {
      const selectedMonth = document.getElementById('filter-month').value;
      if (!selectedMonth) return;

      const [year, month] = selectedMonth.split('-').map(Number);

      // 締め期間（前月25日〜当月24日）
      let prevYear = year;
      let prevMonth = month - 1;
      if (prevMonth === 0) {
        prevMonth = 12;
        prevYear -= 1;
      }

      const startDateStr = `${prevYear}-${String(prevMonth).padStart(2, '0')}-25`;
      const endDateStr = `${year}-${String(month).padStart(2, '0')}-24`;

      const startDate = new Date(startDateStr);
      const endDate = new Date(endDateStr);

      // 人別集計
      const userTotals = { "坂寄": 0, "小川": 0, "深澤": 0, "森尻": 0 };
      const userCounts = { "坂寄": 0, "小川": 0, "深澤": 0, "森尻": 0 };

      // 対象データのみ抽出
      allRecords.forEach(rec => {
        const recDate = new Date(rec.date);
        if (recDate >= startDate && recDate <= endDate) {
          if (userTotals[rec.name] !== undefined) {
            userTotals[rec.name] += rec.fare;
            userCounts[rec.name] += 1;
          }
        }
      });

      // UIレンダリング
      const graphContainer = document.getElementById('report-graph-container');
      const tableBody = document.getElementById('report-table-body');

      graphContainer.innerHTML = "";
      tableBody.innerHTML = "";

      // 最大値（プログレスバーの比率用）
      const maxFare = Math.max(...Object.values(userTotals), 5000); 

      let hasData = false;

      Object.keys(userTotals).forEach(name => {
        const total = userTotals[name];
        const count = userCounts[name];
        if (total > 0) hasData = true;

        const percent = (total / maxFare) * 100;

        // グラフ要素の作成
        const graphItem = document.createElement('div');
        graphItem.className = "space-y-1.5";
        graphItem.innerHTML = `
          <div class="flex justify-between items-center text-xs">
            <span class="font-bold text-slate-700">${name} (${count}件)</span>
            <span class="font-bold text-slate-900">¥${total.toLocaleString()}</span>
          </div>
          <div class="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
            <div class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: ${percent}%"></div>
          </div>
        `;
        graphContainer.appendChild(graphItem);

        // 表要素の作成
        const row = document.createElement('tr');
        row.className = "border-b border-slate-50 text-xs";
        row.innerHTML = `
          <td class="py-3.5 font-bold text-slate-800">${name}</td>
          <td class="py-3.5 text-right font-medium text-slate-500">${count}件</td>
          <td class="py-3.5 text-right font-bold text-slate-900">¥${total.toLocaleString()}</td>
        `;
        tableBody.appendChild(row);
      });

      if (!hasData) {
        graphContainer.innerHTML = `<div class="text-center py-8 text-slate-400 text-sm">指定月度の交通費データは存在しません</div>`;
        tableBody.innerHTML = `<tr><td colspan="3" class="text-center py-8 text-slate-400 text-xs">データがありません</td></tr>`;
      }
    };

    // Excel（CSV）エクスポート
    window.downloadCSV = function() {
      if (allRecords.length === 0) {
        alert("保存するデータがありません。");
        return;
      }

      // BOM付きUTF-8（Excelで文字化けしない対策）
      let csvContent = "\uFEFF";
      csvContent += "日付,氏名,交通手段,出発地（乗車駅）,目的地（降車駅）,運賃,区分,備考\n";

      allRecords.forEach(rec => {
        const row = [
          rec.date,
          rec.name,
          rec.transport === 'train' ? '電車' : (rec.transport === 'taxi' ? 'タクシー' : (rec.transport === 'bus' ? 'バス' : 'その他')),
          `"${rec.from || ''}"`,
          `"${rec.to || ''}"`,
          rec.fare,
          rec.payment,
          `"${rec.memo || ''}"`
        ];
        csvContent += row.join(",") + "\n";
      });

      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", `交通費精算データ_${new Date().toISOString().slice(0, 10)}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    // アプリ起動時の設定
    window.onload = function() {
      const today = new Date();
      let defaultYear = today.getFullYear();
      let defaultMonth = today.getMonth() + 1;

      // 25日以降の入力は翌月度扱いにする
      if (today.getDate() >= 25) {
        defaultMonth += 1;
        if (defaultMonth > 12) {
          defaultMonth = 1;
          defaultYear += 1;
        }
      }
      const defaultMonthStr = `${defaultYear}-${String(defaultMonth).padStart(2, '0')}`;

      // 日付と名前の入力をクリアした「未選択（空白）」状態にする
      document.getElementById('input-date').value = "";
      document.getElementById('input-name').value = "";
      document.getElementById('filter-month').value = defaultMonthStr;

      // 交通手段の初期設定（電車）
      selectTransport('train');

      // データのロード
      loadRecords();
    };
  </script>
</body>
</html>
