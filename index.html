<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交通費精算アプリ</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #f3f4f6;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen pb-12">

  <script>
    // -------------------------------------------------------------------------
    // ⚠️ 【ここだけ書き換えてください！】
    // GoogleスプレッドシートのGASで「デプロイ」した際に発行された、
    // 「ウェブアプリのURL（https://script.google.com/macros/s/...）」をここに貼り付けてください。
    // -------------------------------------------------------------------------
    const DATABASE_GAS_URL = "https://script.google.com/macros/s/AKfycbwUcebtbq4p4-zR6OLrk7E3ntZqMJ67WNFEzJ292JjmK0YK3VrVh7-ojiz8vXEUXIZfSQ/exec";

    // -------------------------------------------------------------------------
    // 📢 Google Chatへの即時通知用 Webhook URL
    // (登録時にリアルタイムで通知が飛びます)
    // -------------------------------------------------------------------------
    const WEBHOOK_URL = "https://chat.googleapis.com/v1/spaces/AAAAxHdOaBA/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=Fsh3lqmrbuDx8AqJIyHfeBdDecgx03H1pEJgwBUuPMw";
  </script>

  <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col justify-between">
    <!-- ヘッダー -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white px-6 py-5 sticky top-0 z-30 shadow-md">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-3">
          <div class="bg-white/20 p-2 rounded-xl">
            <i data-lucide="subway" class="w-6 h-6 text-white"></i>
          </div>
          <div>
            <h1 class="text-xl font-bold tracking-wider">交通費精算システム</h1>
            <p class="text-xs text-blue-100 mt-0.5">ODX株式会社 専用</p>
          </div>
        </div>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="p-5 space-y-6 flex-1">
      
      <!-- 交通費登録フォーム -->
      <section class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm space-y-4">
        <div class="flex items-center space-x-2 pb-2 border-b border-gray-100">
          <i data-lucide="plus-circle" class="w-5 h-5 text-blue-600"></i>
          <h2 class="font-bold text-gray-800 text-lg">交通費の登録</h2>
        </div>

        <!-- 交通手段の選択 -->
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">交通手段</label>
          <div class="grid grid-cols-4 gap-2">
            <button type="button" onclick="setTransport('train')" id="btn-transport-train" class="py-2.5 px-1 rounded-xl font-bold text-sm border-2 flex flex-col items-center justify-center space-y-1 transition-all duration-200">
              <i data-lucide="train" class="w-5 h-5"></i>
              <span>電車</span>
            </button>
            <button type="button" onclick="setTransport('taxi')" id="btn-transport-taxi" class="py-2.5 px-1 rounded-xl font-bold text-sm border-2 flex flex-col items-center justify-center space-y-1 transition-all duration-200">
              <i data-lucide="car" class="w-5 h-5"></i>
              <span>タクシー</span>
            </button>
            <button type="button" onclick="setTransport('bus')" id="btn-transport-bus" class="py-2.5 px-1 rounded-xl font-bold text-sm border-2 flex flex-col items-center justify-center space-y-1 transition-all duration-200">
              <i data-lucide="bus" class="w-5 h-5"></i>
              <span>バス</span>
            </button>
            <button type="button" onclick="setTransport('other')" id="btn-transport-other" class="py-2.5 px-1 rounded-xl font-bold text-sm border-2 flex flex-col items-center justify-center space-y-1 transition-all duration-200">
              <i data-lucide="more-horizontal" class="w-5 h-5"></i>
              <span>その他</span>
            </button>
          </div>
        </div>

        <!-- 基本入力欄 -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="input-date" class="block text-xs font-bold text-gray-500 uppercase mb-1">日付</label>
            <input type="date" id="input-date" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-sm font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
          </div>
          <div>
            <label for="input-name" class="block text-xs font-bold text-gray-500 uppercase mb-1">氏名</label>
            <select id="input-name" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-sm font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
              <option value="" selected>選択してください</option>
              <option value="坂寄">坂寄</option>
              <option value="小川">小川</option>
              <option value="深澤">深澤</option>
              <option value="森尻">森尻</option>
            </select>
          </div>
        </div>

        <!-- 出発地と目的地 (タクシー以外で表示) -->
        <div id="section-route" class="space-y-3 transition-all duration-300">
          <div class="relative flex flex-col space-y-2">
            <div>
              <label for="input-from" id="label-from" class="block text-xs font-bold text-gray-500 uppercase mb-1">乗車駅</label>
              <input type="text" id="input-from" placeholder="例：東京" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
            </div>
            
            <!-- 行き帰り入れ替えボタン -->
            <div class="absolute right-3 top-[32px] z-10">
              <button type="button" onclick="swapRoute()" class="bg-white border border-gray-200 p-2 rounded-full shadow-sm hover:shadow-md transition-all text-blue-600 active:scale-90">
                <i data-lucide="arrow-up-down" class="w-4 h-4"></i>
              </button>
            </div>

            <div>
              <label for="input-to" id="label-to" class="block text-xs font-bold text-gray-500 uppercase mb-1">降車駅</label>
              <input type="text" id="input-to" placeholder="例：大手町" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
            </div>
          </div>

          <!-- Yahoo!路線検索連携ボタン -->
          <div id="section-yahoo-btn" class="pt-1">
            <button type="button" onclick="openYahooTransit()" class="w-full bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 py-2.5 px-4 rounded-xl text-sm font-bold flex items-center justify-center space-x-2 transition-all">
              <i data-lucide="search" class="w-4 h-4"></i>
              <span id="text-yahoo-btn">Yahoo!路線情報で運賃を調べる</span>
            </button>
          </div>
        </div>

        <!-- 運賃入力 (交通手段によって切り替え) -->
        <div id="section-fare-options" class="grid grid-cols-2 gap-3">
          <div>
            <label for="input-ic-fare" class="block text-xs font-bold text-gray-500 uppercase mb-1">IC運賃 (円)</label>
            <input type="number" id="input-ic-fare" placeholder="例：168" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
          </div>
          <div>
            <label for="input-regular-fare" class="block text-xs font-bold text-gray-500 uppercase mb-1">切符運賃 (円)</label>
            <input type="number" id="input-regular-fare" placeholder="例：170" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
          </div>
        </div>

        <!-- 単一運賃入力 (タクシー・その他で表示) -->
        <div id="section-single-fare" class="hidden">
          <label for="input-single-fare" id="label-single-fare" class="block text-xs font-bold text-gray-500 uppercase mb-1">運賃 (円)</label>
          <input type="number" id="input-single-fare" placeholder="例：2500" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
        </div>

        <!-- 支払方法と備考 -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="input-payment" class="block text-xs font-bold text-gray-500 uppercase mb-1">支払方法</label>
            <select id="input-payment" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-sm font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
              <option value="現金/個人カード">現金/個人カード</option>
              <option value="コーポレートカード">法人カード</option>
            </select>
          </div>
          <div>
            <label for="input-memo" class="block text-xs font-bold text-gray-500 uppercase mb-1">備考 (任意)</label>
            <input type="text" id="input-memo" placeholder="例：〇〇社訪問" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
          </div>
        </div>

        <!-- 登録ボタン -->
        <button type="button" onclick="submitRecord()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3.5 px-4 rounded-xl font-bold flex items-center justify-center space-x-2 shadow-lg shadow-blue-200 transition-all active:scale-[0.98]">
          <i data-lucide="check-circle" class="w-5 h-5"></i>
          <span>スプレッドシートに登録する</span>
        </button>
      </section>

      <!-- 月別集計 & CSVダウンロード -->
      <section class="bg-slate-900 text-white rounded-2xl p-5 shadow-lg space-y-4">
        <div class="flex items-center justify-between border-b border-slate-800 pb-3">
          <div class="flex items-center space-x-2">
            <i data-lucide="bar-chart-3" class="text-blue-400 w-5 h-5"></i>
            <h2 class="font-bold text-lg">締め日集計</h2>
          </div>
          <!-- 対象月選択 -->
          <select id="filter-month" onchange="loadRecords()" class="bg-slate-800 border border-slate-700 rounded-lg px-2.5 py-1.5 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500">
            <!-- JavaScriptで自動生成 -->
          </select>
        </div>

        <p class="text-xs text-slate-400">※ 締め期間：選択月の前月25日 〜 当月24日</p>

        <!-- 個人別集計リスト -->
        <div id="agg-list" class="space-y-2.5">
          <!-- JSで集計結果を描画 -->
        </div>

        <button type="button" onclick="downloadCSV()" class="w-full bg-slate-800 hover:bg-slate-700 text-blue-400 border border-slate-700 py-3 rounded-xl text-sm font-bold flex items-center justify-center space-x-2 transition-all">
          <i data-lucide="download" class="w-4 h-4"></i>
          <span>この月のデータをCSV(Excel)保存</span>
        </button>
      </section>

      <!-- 履歴一覧 -->
      <section class="space-y-3">
        <div class="flex items-center justify-between">
          <div class="flex items-center space-x-2">
            <i data-lucide="list-todo" class="w-5 h-5 text-gray-700"></i>
            <h2 class="font-bold text-gray-800 text-lg">登録データ履歴</h2>
          </div>
          <span id="history-count" class="bg-gray-200 text-gray-700 px-2.5 py-0.5 rounded-full text-xs font-bold">0 件</span>
        </div>

        <div id="history-list" class="space-y-3">
          <!-- 読み込み中のプレースホルダー -->
          <div class="text-center py-8 text-gray-400 space-y-2">
            <div class="animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-blue-600 rounded-full" role="status" aria-label="loading"></div>
            <p class="text-xs">スプレッドシートからデータを取得中...</p>
          </div>
        </div>
      </section>
    </main>

    <!-- フッター -->
    <footer class="bg-gray-50 border-t border-gray-100 py-4 text-center">
      <p class="text-xs text-gray-400">&copy; 2026 ODX Inc. All Rights Reserved.</p>
    </footer>
  </div>

  <!-- フルスクリーンローディング表示 -->
  <div id="global-loader" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
    <div class="bg-white px-6 py-5 rounded-2xl shadow-xl flex items-center space-x-4">
      <div class="animate-spin w-6 h-6 border-[3px] border-blue-600 border-t-transparent rounded-full"></div>
      <span class="text-sm font-bold text-gray-800" id="loader-text">処理しています...</span>
    </div>
  </div>

  <!-- カスタムダイアログ（モーダル） -->
  <div id="custom-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden p-4">
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 transform transition-all scale-95 opacity-0 duration-200" id="modal-container">
      <div class="flex flex-col items-center text-center space-y-4">
        <div id="modal-icon-bg" class="p-3 rounded-full bg-blue-50 text-blue-600">
          <i data-lucide="info" class="w-8 h-8" id="modal-icon"></i>
        </div>
        <h3 class="text-lg font-bold text-gray-800" id="modal-title">確認</h3>
        <p class="text-sm text-gray-500 whitespace-pre-wrap leading-relaxed" id="modal-message">メッセージ内容</p>
        <div class="flex space-x-3 w-full pt-2" id="modal-buttons">
          <!-- JSでボタンを動的生成 -->
        </div>
      </div>
    </div>
  </div>

  <script>
    let activeTransport = "train"; // デフォルト
    let allRecords = []; // スプレッドシートからロードした生データ配列

    // 初期化処理
    window.onload = function() {
      lucide.createIcons();
      initFilters();
      setTransport("train");
      
      // デフォルト表示をまっさらに設定
      document.getElementById("input-date").value = "";
      document.getElementById("input-name").value = "";

      // URLの設定チェック
      if (!DATABASE_GAS_URL || DATABASE_GAS_URL.includes("ここにデプロイ")) {
        showCustomModal(
          "alert",
          "初期設定が必要です",
          "右側のファイルの上部(24行目付近)にある `DATABASE_GAS_URL` に、Google Apps Scriptで発行されたURLを貼り付けてから、GitHubへアップロードしてください。",
          "warning"
        );
      } else {
        loadRecords();
      }
    };

    // 締め日フィルター（年月プルダウン）の初期化
    function initFilters() {
      const select = document.getElementById("filter-month");
      const today = new Date();
      let year = today.getFullYear();
      let month = today.getMonth() + 1; // 1-12
      
      // 25日以降なら翌月精算扱い
      if (today.getDate() >= 25) {
        month += 1;
        if (month > 12) {
          month = 1;
          year += 1;
        }
      }

      select.innerHTML = "";
      // 過去12ヶ月分を選択肢として追加
      for (let i = 0; i < 12; i++) {
        let optYear = year;
        let optMonth = month - i;
        if (optMonth <= 0) {
          optMonth += 12;
          optYear -= 1;
        }
        const valStr = `${optYear}-${String(optMonth).padStart(2, '0')}`;
        const labelStr = `${optYear}年${optMonth}月度`;
        const opt = document.createElement("option");
        opt.value = valStr;
        opt.textContent = labelStr;
        select.appendChild(opt);
      }
    }

    // 交通手段のタブ切り替え
    function setTransport(type) {
      activeTransport = type;
      
      const types = ["train", "taxi", "bus", "other"];
      types.forEach(t => {
        const btn = document.getElementById(`btn-transport-${t}`);
        if (t === type) {
          btn.classList.add("bg-blue-50", "border-blue-500", "text-blue-600");
          btn.classList.remove("bg-white", "border-gray-200", "text-gray-500");
        } else {
          btn.classList.remove("bg-blue-50", "border-blue-500", "text-blue-600");
          btn.classList.add("bg-white", "border-gray-200", "text-gray-500");
        }
      });

      // 表示項目制御
      const sectionRoute = document.getElementById("section-route");
      const labelFrom = document.getElementById("label-from");
      const labelTo = document.getElementById("label-to");
      const sectionYahooBtn = document.getElementById("section-yahoo-btn");
      const textYahooBtn = document.getElementById("text-yahoo-btn");
      
      const sectionFareOptions = document.getElementById("section-fare-options");
      const sectionSingleFare = document.getElementById("section-single-fare");
      const labelSingleFare = document.getElementById("label-single-fare");

      if (type === "train") {
        sectionRoute.classList.remove("hidden");
        labelFrom.innerText = "乗車駅";
        labelTo.innerText = "降車駅";
        sectionYahooBtn.classList.remove("hidden");
        textYahooBtn.innerText = "Yahoo!路線情報で電車運賃を調べる";
        
        sectionFareOptions.classList.remove("hidden");
        sectionSingleFare.classList.add("hidden");
      } else if (type === "bus") {
        sectionRoute.classList.remove("hidden");
        labelFrom.innerText = "出発地 (バス停/駅)";
        labelTo.innerText = "目的地 (バス停/駅)";
        sectionYahooBtn.classList.remove("hidden");
        textYahooBtn.innerText = "Yahoo!路線情報でバス運賃を調べる";
        
        sectionFareOptions.classList.add("hidden");
        sectionSingleFare.classList.remove("hidden");
        labelSingleFare.innerText = "バス運賃 (円)";
      } else if (type === "taxi") {
        // タクシーは乗降場所なし
        sectionRoute.classList.add("hidden");
        
        sectionFareOptions.classList.add("hidden");
        sectionSingleFare.classList.remove("hidden");
        labelSingleFare.innerText = "タクシー料金 (円)";
      } else if (type === "other") {
        sectionRoute.classList.remove("hidden");
        labelFrom.innerText = "出発地";
        labelTo.innerText = "目的地";
        sectionYahooBtn.classList.add("hidden");
        
        sectionFareOptions.classList.add("hidden");
        sectionSingleFare.classList.remove("hidden");
        labelSingleFare.innerText = "運賃/金額 (円)";
      }
    }

    // 出発地と目的地の入れ替え
    function swapRoute() {
      const fromInput = document.getElementById("input-from");
      const toInput = document.getElementById("input-to");
      const temp = fromInput.value;
      fromInput.value = toInput.value;
      toInput.value = temp;
    }

    // Yahoo!路線情報へ連携
    function openYahooTransit() {
      const from = document.getElementById("input-from").value.trim();
      const to = document.getElementById("input-to").value.trim();
      
      if (!from || !to) {
        showCustomModal("alert", "確認", "出発地(乗車駅)と目的地(降車駅)の両方を入力してください。", "warning");
        return;
      }
      
      let url = `https://transit.yahoo.co.jp/search/result?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
      if (activeTransport === "bus") {
        url += "&kb=XS&al=1"; // バス優先
      }
      window.open(url, "_blank");
    }

    // スプレッドシートからデータを取得
    async function loadRecords() {
      if (!DATABASE_GAS_URL || DATABASE_GAS_URL.includes("ここにデプロイ")) return;

      const historyList = document.getElementById("history-list");
      
      try {
        const response = await fetch(DATABASE_GAS_URL);
        const data = await response.json();
        
        if (data.error) {
          throw new Error(data.error);
        }
        
        // 最新のものが上に来るように逆順にソートして保持
        allRecords = data.reverse();
        
        renderUI();
      } catch (err) {
        console.error(err);
        historyList.innerHTML = `
          <div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl text-xs space-y-1">
            <p class="font-bold">❌ データの読み込みに失敗しました</p>
            <p class="text-gray-500">デプロイ先のウェブアプリURLが正しく、アクセス権限が「全員(Anyone)」で設定されているか確認してください。</p>
            <p class="text-gray-400 mt-2">エラー詳細: ${err.message}</p>
          </div>
        `;
      }
    }

    // 集計と履歴一覧のUI反映
    function renderUI() {
      const activeMonthStr = document.getElementById("filter-month").value; // "YYYY-MM"
      const [year, month] = activeMonthStr.split("-").map(Number);
      
      // 集計期間フィルタリング用 (前月25日〜当月24日)
      const startDate = new Date(year, month - 2, 25);
      const endDate = new Date(year, month - 1, 24, 23, 59, 59);

      // ① 履歴一覧の描画 (全データ表示)
      const historyList = document.getElementById("history-list");
      const historyCount = document.getElementById("history-count");
      historyList.innerHTML = "";
      historyCount.innerText = `${allRecords.length} 件`;

      if (allRecords.length === 0) {
        historyList.innerHTML = `
          <div class="text-center py-10 bg-gray-50 rounded-2xl border border-dashed border-gray-200">
            <p class="text-sm text-gray-400">登録された履歴はありません</p>
          </div>
        `;
      } else {
        allRecords.forEach(rec => {
          const card = document.createElement("div");
          card.className = "bg-white border border-gray-100 rounded-2xl p-4 shadow-sm relative space-y-2";
          
          let transBadge = "";
          if (rec.transport === "train") transBadge = `<span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-lg text-[10px] font-bold">🚆 電車</span>`;
          else if (rec.transport === "taxi") transBadge = `<span class="bg-yellow-50 text-yellow-700 px-2 py-0.5 rounded-lg text-[10px] font-bold">🚖 タクシー</span>`;
          else if (rec.transport === "bus") transBadge = `<span class="bg-green-50 text-green-600 px-2 py-0.5 rounded-lg text-[10px] font-bold">🚌 バス</span>`;
          else transBadge = `<span class="bg-purple-50 text-purple-600 px-2 py-0.5 rounded-lg text-[10px] font-bold">📍 その他</span>`;

          const routeStr = rec.transport === "taxi" ? "" : `<div class="text-sm font-bold text-gray-800 flex items-center space-x-1"><span>${rec.from}</span> <i data-lucide="arrow-right" class="w-3.5 h-3.5 text-gray-400"></i> <span>${rec.to}</span></div>`;

          card.innerHTML = `
            <div class="flex items-center justify-between">
              <div class="flex items-center space-x-2 text-xs font-bold text-gray-400">
                <span>${rec.date}</span>
                <span>•</span>
                <span>${rec.name}</span>
              </div>
              <div class="flex items-center space-x-2">
                ${transBadge}
                <button type="button" onclick="confirmDelete(${rec.id})" class="text-red-400 hover:text-red-600 p-1 rounded-lg transition-all">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
            ${routeStr}
            <div class="flex items-center justify-between pt-1 border-t border-gray-50">
              <span class="text-xs text-gray-400 font-medium">${rec.payment} ${rec.memo ? ` | ${rec.memo}` : ""}</span>
              <span class="text-md font-extrabold text-blue-600">¥${rec.fare.toLocaleString()}</span>
            </div>
          `;
          historyList.appendChild(card);
        });
        lucide.createIcons();
      }

      // ② 集計 (選択された締め日期間内のみ)
      const monthlyRecords = allRecords.filter(rec => {
        const rDate = new Date(rec.date);
        return rDate >= startDate && rDate <= endDate;
      });

      const personalSums = { "坂寄": 0, "小川": 0, "深澤": 0, "森尻": 0 };
      monthlyRecords.forEach(rec => {
        if (personalSums.hasOwnProperty(rec.name)) {
          personalSums[rec.name] += Number(rec.fare);
        }
      });

      const aggList = document.getElementById("agg-list");
      aggList.innerHTML = "";
      
      let grandTotal = 0;
      Object.entries(personalSums).forEach(([pName, total]) => {
        grandTotal += total;
        const row = document.createElement("div");
        row.className = "flex items-center justify-between py-1.5 border-b border-slate-800 text-sm";
        row.innerHTML = `
          <div class="flex items-center space-x-2">
            <span class="w-2.5 h-2.5 rounded-full bg-blue-500"></span>
            <span class="font-bold text-slate-300">${pName}</span>
          </div>
          <span class="font-extrabold text-white">¥${total.toLocaleString()}</span>
        `;
        aggList.appendChild(row);
      });

      // 総計
      const grandTotalRow = document.createElement("div");
      grandTotalRow.className = "flex items-center justify-between pt-2 text-md font-bold text-blue-400";
      grandTotalRow.innerHTML = `
        <span>合計</span>
        <span class="text-lg font-extrabold">¥${grandTotal.toLocaleString()}</span>
      `;
      aggList.appendChild(grandTotalRow);
    }

    // データの登録
    async function submitRecord() {
      const date = document.getElementById("input-date").value;
      const name = document.getElementById("input-name").value;
      const from = document.getElementById("input-from").value.trim();
      const to = document.getElementById("input-to").value.trim();
      const icFare = document.getElementById("input-ic-fare").value;
      const regularFare = document.getElementById("input-regular-fare").value;
      const singleFare = document.getElementById("input-single-fare").value;
      const payment = document.getElementById("input-payment").value;
      const memo = document.getElementById("input-memo").value.trim();

      // バリデーション
      if (!DATABASE_GAS_URL || DATABASE_GAS_URL.includes("ここにデプロイ")) {
        showCustomModal("alert", "未設定", "上部にある「DATABASE_GAS_URL」にウェブアプリのURLを入力してください。", "warning");
        return;
      }
      if (!date) {
        showCustomModal("alert", "エラー", "日付を選択してください。", "warning");
        return;
      }
      if (!name) {
        showCustomModal("alert", "エラー", "氏名を選択してください。", "warning");
        return;
      }

      // 交通手段ごとの入力バリデーション
      let finalFare = 0;
      if (activeTransport === "train") {
        if (!from || !to) {
          showCustomModal("alert", "エラー", "乗車駅と降車駅の両方を入力してください。", "warning");
          return;
        }
        if (!icFare && !regularFare) {
          showCustomModal("alert", "エラー", "IC運賃か切符運賃のどちらかを入力してください。", "warning");
          return;
        }
        finalFare = Number(icFare || regularFare);
      } else if (activeTransport === "bus") {
        if (!from || !to) {
          showCustomModal("alert", "エラー", "出発地と目的地の両方を入力してください。", "warning");
          return;
        }
        if (!singleFare) {
          showCustomModal("alert", "エラー", "バス運賃を入力してください。", "warning");
          return;
        }
        finalFare = Number(singleFare);
      } else if (activeTransport === "taxi") {
        if (!singleFare) {
          showCustomModal("alert", "エラー", "タクシー料金を入力してください。", "warning");
          return;
        }
        finalFare = Number(singleFare);
      } else if (activeTransport === "other") {
        if (!from || !to) {
          showCustomModal("alert", "エラー", "出発地と目的地の両方を入力してください。", "warning");
          return;
        }
        if (!singleFare) {
          showCustomModal("alert", "エラー", "金額を入力してください。", "warning");
          return;
        }
        finalFare = Number(singleFare);
      }

      // ローディング開始
      toggleGlobalLoader(true, "データを登録中...");

      const recordData = {
        action: "create",
        date: date,
        name: name,
        transport: activeTransport,
        from: activeTransport === "taxi" ? "（指定なし）" : from,
        to: activeTransport === "taxi" ? "（指定なし）" : to,
        fare: finalFare,
        payment: payment,
        memo: memo
      };

      try {
        // ① スプレッドシートへ送信
        const response = await fetch(DATABASE_GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" }, // CORS回避のためtext/plain
          body: JSON.stringify(recordData)
        });
        
        const resJson = await response.json();
        
        if (resJson.status === "error") {
          throw new Error(resJson.message);
        }

        // ② Google Chatへの即時Webhook通知
        if (WEBHOOK_URL && !WEBHOOK_URL.includes("ここに")) {
          const routeText = activeTransport === "taxi" ? "" : `\n📍 区間：${from} ➡️ ${to}`;
          const chatMessage = `📢 交通費の精算登録がありました！\n👤 精算者：${name} さん\n🚗 手段：${activeTransport === "train" ? "🚆 電車" : activeTransport === "taxi" ? "🚖 タクシー" : activeTransport === "bus" ? "🚌 バス" : "📍 その他"}${routeText}\n💵 金額：¥${finalFare.toLocaleString()} (${payment})\n💬 備考：${memo || "特になし"}`;

          await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: chatMessage })
          }).catch(chatErr => console.warn("Google Chat通知失敗:", chatErr));
        }

        // フォームのリセット (完全にクリアな初期状態に戻す)
        document.getElementById("input-date").value = "";
        document.getElementById("input-name").value = "";
        document.getElementById("input-from").value = "";
        document.getElementById("input-to").value = "";
        document.getElementById("input-ic-fare").value = "";
        document.getElementById("input-regular-fare").value = "";
        document.getElementById("input-single-fare").value = "";
        document.getElementById("input-memo").value = "";
        setTransport("train");

        toggleGlobalLoader(false);
        showCustomModal("alert", "登録完了", "スプレッドシートへ正常に登録し、Google Chatへ通知を行いました！", "success");
        
        // 再ロード
        loadRecords();

      } catch (err) {
        console.error(err);
        toggleGlobalLoader(false);
        showCustomModal("alert", "登録エラー", "データの保存に失敗しました。GASのウェブアプリの設定やURLが正しいか確認してください。\n\n詳細: " + err.message, "danger");
      }
    }

    // 削除確認
    function confirmDelete(id) {
      showCustomModal(
        "confirm",
        "削除しますか？",
        "この登録データを削除してもよろしいですか？\n削除するとスプレッドシート上からも完全に消去されます。",
        "danger",
        async () => {
          toggleGlobalLoader(true, "データを削除中...");
          try {
            const response = await fetch(DATABASE_GAS_URL, {
              method: "POST",
              headers: { "Content-Type": "text/plain" },
              body: JSON.stringify({ action: "delete", rowId: id })
            });
            const resJson = await response.json();
            
            if (resJson.status === "error") {
              throw new Error(resJson.message);
            }
            
            toggleGlobalLoader(false);
            showCustomModal("alert", "削除完了", "正常に削除しました。", "success");
            loadRecords();
          } catch (err) {
            console.error(err);
            toggleGlobalLoader(false);
            showCustomModal("alert", "削除エラー", "削除処理に失敗しました。\n詳細: " + err.message, "danger");
          }
        }
      );
    }

    // CSVダウンロード
    function downloadCSV() {
      const activeMonthStr = document.getElementById("filter-month").value;
      const [year, month] = activeMonthStr.split("-").map(Number);
      
      const startDate = new Date(year, month - 2, 25);
      const endDate = new Date(year, month - 1, 24, 23, 59, 59);

      // フィルター対象月のみ
      const targetRecords = allRecords.filter(rec => {
        const rDate = new Date(rec.date);
        return rDate >= startDate && rDate <= endDate;
      });

      if (targetRecords.length === 0) {
        showCustomModal("alert", "出力エラー", "この月度のデータはまだ登録されていません。", "warning");
        return;
      }

      // CSV生成 (Shift-JISまたはUTF-8(BOM付き))
      let csvContent = "\uFEFF"; // BOMを追加してExcelでの文字化けを防ぐ
      csvContent += "日付,氏名,交通手段,出発地,目的地,金額,支払方法,備考,登録日時\n";

      targetRecords.forEach(rec => {
        const transportJa = rec.transport === "train" ? "電車" : rec.transport === "taxi" ? "タクシー" : rec.transport === "bus" ? "バス" : "その他";
        const row = [
          rec.date,
          rec.name,
          transportJa,
          `"${rec.from.replace(/"/g, '""')}"`,
          `"${rec.to.replace(/"/g, '""')}"`,
          rec.fare,
          rec.payment,
          `"${(rec.memo || "").replace(/"/g, '""')}"`,
          rec.createdAt
        ].join(",");
        csvContent += row + "\n";
      });

      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      link.setAttribute("download", `交通費精算_${activeMonthStr}月度.csv`);
      link.style.visibility = "hidden";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // グローバルローダーのオン・オフ
    function toggleGlobalLoader(show, text = "処理しています...") {
      const loader = document.getElementById("global-loader");
      const loaderText = document.getElementById("loader-text");
      loaderText.innerText = text;
      if (show) {
        loader.classList.remove("hidden");
      } else {
        loader.classList.add("hidden");
      }
    }

    // 美しいカスタムダイアログ（モーダル表示）
    function showCustomModal(type, title, message, theme = "info", confirmCallback = null) {
      const modal = document.getElementById("custom-modal");
      const container = document.getElementById("modal-container");
      const modalTitle = document.getElementById("modal-title");
      const modalMessage = document.getElementById("modal-message");
      const modalButtons = document.getElementById("modal-buttons");
      const modalIconBg = document.getElementById("modal-icon-bg");
      const modalIcon = document.getElementById("modal-icon");

      // テーマの設定
      modalIconBg.className = "p-3 rounded-full " + 
        (theme === "success" ? "bg-green-50 text-green-600" :
         theme === "danger" ? "bg-red-50 text-red-600" :
         theme === "warning" ? "bg-yellow-50 text-yellow-600" : "bg-blue-50 text-blue-600");
      
      modalIcon.setAttribute("data-lucide", 
        theme === "success" ? "check" :
         theme === "danger" ? "alert-triangle" :
         theme === "warning" ? "alert-circle" : "info");
      
      lucide.createIcons();

      modalTitle.innerText = title;
      modalMessage.innerText = message;
      modalButtons.innerHTML = "";

      // ボタンの配置
      if (type === "confirm") {
        const cancelBtn = document.createElement("button");
        cancelBtn.type = "button";
        cancelBtn.className = "flex-1 border border-gray-200 hover:bg-gray-50 text-gray-700 py-2.5 rounded-xl font-bold text-sm transition-all";
        cancelBtn.innerText = "キャンセル";
        cancelBtn.onclick = () => hideCustomModal();

        const okBtn = document.createElement("button");
        okBtn.type = "button";
        okBtn.className = "flex-1 " + (theme === "danger" ? "bg-red-600 hover:bg-red-700 text-white" : "bg-blue-600 hover:bg-blue-700 text-white") + " py-2.5 rounded-xl font-bold text-sm transition-all";
        okBtn.innerText = "OK";
        okBtn.onclick = () => {
          hideCustomModal();
          if (confirmCallback) confirmCallback();
        };

        modalButtons.appendChild(cancelBtn);
        modalButtons.appendChild(okBtn);
      } else {
        const closeBtn = document.createElement("button");
        closeBtn.type = "button";
        closeBtn.className = "w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl font-bold text-sm transition-all";
        closeBtn.innerText = "閉じる";
        closeBtn.onclick = () => hideCustomModal();
        modalButtons.appendChild(closeBtn);
      }

      // 表示アニメーション
      modal.classList.remove("hidden");
      setTimeout(() => {
        container.classList.remove("scale-95", "opacity-0");
        container.classList.add("scale-100", "opacity-100");
      }, 50);
    }

    function hideCustomModal() {
      const modal = document.getElementById("custom-modal");
      const container = document.getElementById("modal-container");
      container.classList.remove("scale-100", "opacity-100");
      container.classList.add("scale-95", "opacity-0");
      setTimeout(() => {
        modal.classList.add("hidden");
      }, 150);
    }
  </script>
</body>
